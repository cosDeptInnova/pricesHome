project:
  name: "homebuy_ai"
  timezone: "Europe/Madrid"
  region_focus: ["Comunidad de Madrid", "Corredor del Henares"]

paths:
  listings_csv: "data/input/INE_Vivienda.csv"
  output_dir: "data/output"

listings:
  source: "csv" # csv | api
  api:
    endpoint: "https://api.tu_fuente_oficial.es/listings"
    method: "GET"
    timeout_seconds: 25
    token: ""
    token_header: "Authorization"
    records_key: "results"
    headers: {}
    params: {}
    # mapping destino->origen en payload API
    field_mapping:
      listing_id: "id"
      date: "published_at"
      municipio: "municipality"
      price: "price_eur"
      m2: "built_area"
      rooms: "bedrooms"
      piscina: "pool"
      zonas_comunes: "common_areas"
      garage: "parking"
      ascensor: "lift"
      tipologia: "property_type"

filters:
  must_have:
    - "piscina"
    - "zonas_comunes"
  min_m2: 70
  max_price: 500000
  municipios_prioritarios:
    - "Mejorada del Campo"
    - "Velilla de San Antonio"

macro:
  euribor_12m: 3.10
  inflation_yoy: 2.90
  unemployment_rate: 10.8
  ibex_monthly_change_pct: 1.2

historical:
  sources:
    - source: "INE"
      indicator: "ipc_yoy"
      scope: "Comunidad de Madrid"
      path: "data/input/historical_ine_ipc.csv"
    - source: "MITMA"
      indicator: "precio_vivienda_m2"
      scope: "Comunidad de Madrid"
      path: "data/input/historical_mitma_price_m2.csv"
    - source: "BdE"
      indicator: "tipo_hipoteca_medio"
      scope: "España"
      path: "data/input/historical_bde_mortgage_rate.csv"
    - source: "INE"
      indicator: "ipv_ccaa"
      scope: "Comunidad de Madrid"
      path: "../historico_vivienda_INE.xlsx"

news:
  rss_feeds:
    - "https://feeds.elpais.com/mrss-s/pages/ep/site/elpais.com/section/economia/portada"
    - "https://e00-expansion.uecdn.es/rss/empresas.xml"
    - "https://www.abc.es/rss/feeds/abc_Economia.xml"
  keywords:
    - "vivienda"
    - "hipoteca"
    - "euribor"
    - "suelo"
    - "urbanismo"
    - "tipo de interés"

model:
  test_size: 0.2
  random_state: 42
  target_col: "price_per_m2"
  segment_min_rows: 8

forecast:
  horizon_months: 6

scoring:
  weights:
    valuation_gap: 0.35
    macro_affordability: 0.25
    inventory_pressure: 0.20
    news_sentiment: 0.20
  thresholds:
    buy: 70
    wait: 45


research:
  top_prompts: 12
  engine: "thread_pool" # thread_pool | queue | kafka | flink
  max_workers: 4
  kafka:
    bootstrap_servers: "localhost:9092"
    topic: "homebuy.research.prompts"
    client_id: "homebuy-ai"
    publish_timeout_s: 5

openai:
  enabled: true
  api_key: "PUT_YOUR_OPENAI_API_KEY_HERE"
  model: "gpt-4o-mini"
